name = "grind_experiments"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["GrindExperiments"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0-rc4"

[[lean_lib]]
name = "GrindExperiments"
